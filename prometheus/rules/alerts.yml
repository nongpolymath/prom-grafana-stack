groups:
  - name: infrastructure
    rules:

      # ── Node is completely unreachable ──────────────────────────
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} is down"
          description: "{{ $labels.job }} on {{ $labels.instance }} has been down for > 1 minute."

      # ── CPU sustained above 85% ─────────────────────────────────
      - alert: HighCPUUsage
        expr: >
          100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | printf \"%.1f\" }}% (threshold: 85%)"
      
       # ── Memory above 90% ────────────────────────────────────────
      - alert: HighMemoryUsage
        expr: >
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory on {{ $labels.instance }}"
          description: "Memory usage is {{ $value | printf \"%.1f\" }}% (threshold: 90%)"

      # ── Disk filling up ─────────────────────────────────────────
      - alert: DiskSpaceLow
        expr: >
          (node_filesystem_avail_bytes{mountpoint="/"} /
           node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Only {{ $value | printf \"%.1f\" }}% disk remaining on /"

  - name: redis
    rules:
      # ── Redis out of memory ─────────────────────────────────────
      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 90
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory > 90%"
          description: "Redis is using {{ $value | printf \"%.1f\" }}% of max memory."

      # ── Redis down ──────────────────────────────────────────────
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis instance is unreachable."

  - name: postgres
    rules:
      # ── Too many connections ────────────────────────────────────
      - alert: PostgresConnectionsHigh
        expr: >
          pg_stat_activity_count{state="active"} /
          pg_settings_max_connections * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Postgres connections above 80%"
          description: "{{ $value | printf \"%.1f\" }}% of max connections in use."