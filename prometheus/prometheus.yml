global:
  scrape_interval: 15s
  evaluation_interval: 15s


scrape_configs:
  #prometheus scraping itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

   # Node Exporter — host OS metrics (CPU, memory, disk, network)
  - job_name: "node_exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "flask-app"
    static_configs:
      - targets: ["flask-app:5000"]   # service name : container port
    metrics_path: /metrics

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

